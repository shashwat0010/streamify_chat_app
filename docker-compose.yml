version: '3.8'

services:
  redis:
    image: redis:alpine
    container_name: streamify-redis
    restart: always
    volumes:
      - redis-data:/data
    networks:
      - streamify-network

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: streamify-backend
    restart: always
    environment:
      - PORT=5001
      - NODE_ENV=production
      - MONGO_URI=${MONGO_URI}
      - REDIS_URL=redis://redis:6379
      - CLIENT_URL=https://streamify-chat.duckdns.org
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - STREAM_API_KEY=${STREAM_API_KEY}
      - STREAM_API_SECRET=${STREAM_API_SECRET}
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY}
      - CLERK_PUBLISHABLE_KEY=${CLERK_PUBLISHABLE_KEY}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_S3_BUCKET_NAME=${AWS_S3_BUCKET_NAME}
      - AWS_REGION=${AWS_REGION}
    depends_on:
      - redis
    networks:
      - streamify-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_STREAM_API_KEY=${VITE_STREAM_API_KEY}
        - VITE_CLERK_PUBLISHABLE_KEY=${VITE_CLERK_PUBLISHABLE_KEY}
        - VITE_BACKEND_URL=https://streamify-chat.duckdns.org/api
    container_name: streamify-frontend
    restart: always
    depends_on:
      - backend
    networks:
      - streamify-network

  nginx:
    image: nginx:alpine
    container_name: streamify-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - frontend
      - backend
    networks:
      - streamify-network

volumes:
  redis-data:

networks:
  streamify-network:
    driver: bridge
