apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: streamify
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: streamify-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          env:
            - name: VITE_STREAM_API_KEY
              value: "zwea8dda3prb"
            - name: VITE_CLERK_PUBLISHABLE_KEY
              value: "pk_test_d2VsY29tZWQtb3Bvc3N1bS04Ni5jbGVyay5hY2NvdW50cy5kZXYk"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: streamify
spec:
  type: LoadBalancer
  ports:
    - port: 80
      targetPort: 80
  selector:
    app: frontend
