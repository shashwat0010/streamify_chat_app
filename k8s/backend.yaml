apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: streamify
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: streamify-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5001
          env:
            - name: PORT
              value: "5001"
            - name: NODE_ENV
              value: "production"
            - name: MONGO_URI
              value: "mongodb://mongodb:27017/streamify"
            - name: REDIS_URL
              value: "redis://redis:6379"
            - name: CLIENT_URL
              value: "http://streamify-frontend"
            # These secrets should be sourced from K8s Secrets, configured here with placeholders
            - name: JWT_SECRET_KEY
              value: "your_jwt_secret_key"
            - name: STREAM_API_KEY
              value: "your_stream_api_key"
            - name: STREAM_API_SECRET
              value: "your_stream_api_secret"
            - name: CLERK_SECRET_KEY
              value: "your_clerk_secret_key"
            - name: CLERK_PUBLISHABLE_KEY
              value: "your_clerk_publishable_key"
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: streamify
spec:
  ports:
    - port: 5001
      targetPort: 5001
  selector:
    app: backend
