name: Streamify CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Root & Backend Dependencies
        run: |
          npm install
          cd backend && npm install

      - name: Install Frontend Dependencies
        run: |
          cd frontend && npm install

      - name: Build Frontend
        run: |
          cd frontend && CI=false npm run build

  build-docker-images:
    needs: test-and-lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Backend Image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false # Do not push to registry during test build
          tags: streamify-backend:latest

      - name: Build Frontend Image
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false # Do not push to registry during test build
          tags: streamify-frontend:latest

  deploy:
    needs: build-docker-images
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to AWS EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/streamify_chat_app
            git pull origin main
            
            # Export environment variables for Docker run
            export MONGO_URI="${{ secrets.MONGO_URI }}"
            export JWT_SECRET_KEY="${{ secrets.JWT_SECRET_KEY }}"
            export STREAM_API_KEY="${{ secrets.STREAM_API_KEY }}"
            export STREAM_API_SECRET="${{ secrets.STREAM_API_SECRET }}"
            export CLERK_SECRET_KEY="${{ secrets.CLERK_SECRET_KEY }}"
            export CLERK_PUBLISHABLE_KEY="${{ secrets.CLERK_PUBLISHABLE_KEY }}"
            export VITE_STREAM_API_KEY="${{ secrets.VITE_STREAM_API_KEY }}"
            export VITE_CLERK_PUBLISHABLE_KEY="${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}"
            export AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}"
            export AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}"
            export AWS_S3_BUCKET_NAME="${{ secrets.AWS_S3_BUCKET_NAME }}"
            export AWS_REGION="${{ secrets.AWS_REGION }}"
            
            # Restart containers with updated images
            docker-compose down
            docker-compose up --build -d
            
            # Clean up dangling images to save disk space
            docker image prune -f
